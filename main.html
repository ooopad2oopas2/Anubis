<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anubis – Institutional Trend Interface</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root { --bg:#05060a; --bg-elevated:#0b0f16; --bg-elevated-soft:#101621; --bg-chip:#131a26; --accent:#f0b55a; --accent-soft:rgba(240,181,90,0.12); --accent-strong:#ffcf73; --accent-danger:#ff5a5f; --accent-success:#3dd68c; --accent-neutral:#8a9ab5; --border-subtle:rgba(255,255,255,0.06); --border-strong:rgba(255,255,255,0.16); --text-main:#f5f7ff; --text-muted:#909ab5; --text-soft:#6a748f; --shadow-soft:0 18px 60px rgba(0,0,0,0.6); --shadow-subtle:0 8px 30px rgba(0,0,0,0.45); --radius-lg:18px; --radius-md:12px; --radius-pill:999px; --input-height:44px; --transition-fast:160ms ease-out; --transition-med:220ms ease-out; --nav-h:64px; --layout-max-width:1440px; --chart-height:320px; --scrollbar-track:rgba(255,255,255,0.04); --scrollbar-thumb:rgba(255,255,255,0.16); --scrollbar-thumb-hover:rgba(255,255,255,0.26); }
    * { box-sizing:border-box; margin:0; padding:0; }
    html, body { height:100%; }

    body::before { content:""; position:fixed; inset:0; background:radial-gradient(circle at 15% 0,rgba(240,181,90,0.12),transparent 55%),radial-gradient(circle at 80% 0,rgba(90,207,240,0.09),transparent 55%); mix-blend-mode:screen; opacity:.8; pointer-events:none; z-index:-1; }

    .page { min-height:100vh; display:flex; flex-direction:column; }

    .header-time span { color:var(--accent); font-weight:500; }

    .message-health-label span { color:var(--accent-strong); font-weight:500; }

    .message-health-bar-fill { position:absolute; inset:0; width:46%; background:linear-gradient(90deg,var(--accent-success),var(--accent),#ffcf73); box-shadow:0 0 12px rgba(240,181,90,0.9); }
    .message-health-footer { display:flex; align-items:center; justify-content:space-between; gap:10px; font-size:.76rem; color:var(--text-soft); }
    .message-pill-row { display:flex; flex-wrap:wrap; gap:6px; margin-top:2px; }
    .message-pill { padding:3px 10px; border-radius:var(--radius-pill); background:rgba(17,25,40,0.88); border:1px dashed rgba(240,181,90,0.3); color:var(--text-soft); font-size:.74rem; letter-spacing:.09em; text-transform:uppercase; }
    .stat-row { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:12px; margin-top:10px; }
    .stat-card { border-radius:var(--radius-md); padding:10px 12px 11px; background:radial-gradient(circle at 0 0,rgba(240,181,90,0.16),transparent 55%),rgba(6,8,13,0.96); border:1px solid rgba(240,181,90,0.35); box-shadow:var(--shadow-subtle); position:relative; overflow:hidden; }

    .stat-label { font-size:.74rem; letter-spacing:.1em; text-transform:uppercase; color:var(--text-soft); display:flex; align-items:center; gap:8px; margin-bottom:2px; }

    .sub-stat { margin-top:6px; font-size:.78rem; color:var(--text-soft); display:flex; justify-content:space-between; gap:6px; }
    .tab-strip { margin-top:16px; display:flex; flex-wrap:wrap; gap:6px; padding:4px; border-radius:var(--radius-pill); background:rgba(5,7,11,0.98); border:1px solid rgba(255,255,255,0.04); }
    .tab { flex:1 1 auto; min-width:96px; padding:7px 12px; font-size:.78rem; letter-spacing:.14em; text-transform:uppercase; border-radius:var(--radius-pill); border:none; background:transparent; color:var(--text-soft); cursor:pointer; transition:background var(--transition-med),color var(--transition-med),transform var(--transition-fast),box-shadow var(--transition-fast); display:flex; align-items:center; justify-content:center; gap:6px; }
    .tab span.icon { font-size:1rem; }
    .tab.active { background:radial-gradient(circle at 0 0,rgba(240,181,90,0.36),transparent 55%),rgba(11,15,22,0.98); color:var(--accent-strong); box-shadow:0 0 0 1px rgba(240,181,90,0.5),var(--shadow-subtle); transform:translateY(-1px); }
    .tab:not(.active):hover { background:rgba(255,255,255,0.03); color:#d5d9e8; }
    .tab-content { margin-top:14px; display:none; gap:14px; }
    .tab-content.active { display:grid; grid-template-columns:minmax(0,1.1fr) minmax(0,1fr); }
    .tab-section { display:flex; flex-direction:column; gap:12px; }
    .sub-panel-title { font-size:.86rem; letter-spacing:.14em; text-transform:uppercase; color:var(--accent-strong); display:flex; align-items:center; justify-content:space-between; gap:8px; }
    .sub-panel-description { font-size:.8rem; color:var(--text-soft); }
    .sub-panel { border-radius:var(--radius-md); border:1px solid rgba(255,255,255,0.06); background:rgba(9,12,19,0.98); padding:10px 12px 12px; display:flex; flex-direction:column; gap:10px; }
    form { display:flex; flex-direction:column; gap:10px; }
    .form-row { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:10px; }
    .form-field { display:flex; flex-direction:column; gap:4px; }
    .form-label { font-size:.78rem; letter-spacing:.12em; text-transform:uppercase; color:var(--text-soft); display:flex; align-items:center; justify-content:space-between; gap:6px; }
    .form-label span { font-weight:500; color:var(--accent-strong); }

    .input, select, textarea { width:100%; border-radius:10px; border:1px solid rgba(255,255,255,0.08); background:radial-gradient(circle at 0 0,rgba(240,181,90,0.07),transparent 55%),rgba(8,11,17,1); color:var(--text-main); padding:8px 11px; font-size:.88rem; min-height:var(--input-height); outline:none; transition:border var(--transition-fast),box-shadow var(--transition-fast),background var(--transition-fast),transform var(--transition-fast); }
    .input::placeholder, textarea::placeholder { color:rgba(144,154,181,0.7); }
    textarea { resize:vertical; min-height:70px; }
    .input:focus, select:focus, textarea:focus { border-color:rgba(240,181,90,0.8); box-shadow:0 0 0 1px rgba(240,181,90,0.7),0 0 0 .5px rgba(5,6,10,1); transform:translateY(-.5px); }
    .input[disabled], select[disabled], textarea[disabled] { opacity:.6; cursor:not-allowed; }
    select { appearance:none; -webkit-appearance:none; -moz-appearance:none; background-image:linear-gradient(45deg,transparent 50%,var(--accent-strong) 50%),linear-gradient(135deg,var(--accent-strong) 50%,transparent 50%); background-position:calc(100% - 18px) 17px,calc(100% - 13px) 17px; background-size:6px 6px,6px 6px; background-repeat:no-repeat; }
    .button-row { display:flex; flex-wrap:wrap; align-items:center; gap:8px; justify-content:flex-end; margin-top:4px; }
    .btn { position:relative; border-radius:var(--radius-pill); border:1px solid rgba(240,181,90,0.85); background:radial-gradient(circle at 0 0,rgba(240,181,90,0.3),transparent 70%),#15110b; color:#0b0905; font-weight:600; font-size:.82rem; letter-spacing:.14em; text-transform:uppercase; padding:9px 20px; cursor:pointer; display:inline-flex; align-items:center; gap:8px; overflow:hidden; box-shadow:0 16px 40px rgba(0,0,0,0.9); transition:transform var(--transition-fast),box-shadow var(--transition-fast),background var(--transition-fast),color var(--transition-fast); }
    .btn span.icon { font-size:1rem; }
    .btn::after { content:""; position:absolute; inset:0; background:linear-gradient(120deg,rgba(255,255,255,0.4),transparent 55%); mix-blend-mode:soft-light; opacity:0; transition:opacity var(--transition-fast),transform var(--transition-fast); transform:translateX(-20%); }
    .btn:hover { transform:translateY(-1px); box-shadow:0 22px 60px rgba(0,0,0,0.96); background:radial-gradient(circle at 0 0,rgba(240,181,90,0.42),transparent 70%),#1b140a; }
